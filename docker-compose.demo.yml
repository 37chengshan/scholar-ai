version: '3.8'

# ScholarAI Demo Compose - Minimal Setup for Competition Demo
# 7 services: postgres, redis, etcd, minio, milvus-standalone, backend, celery_worker
# Removed: neo4j, nginx

services:
  # PostgreSQL 数据库 (带PGVector扩展)
  postgres:
    image: pgvector/pgvector:pg15
    container_name: scholarai-postgres
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: scholarai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # etcd - Milvus metadata store
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: scholarai-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # MinIO - Milvus object storage
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: scholarai-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # Milvus - Vector database for multimodal search
  milvus-standalone:
    image: milvusdb/milvus:v2.3.3
    container_name: scholarai-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

  # Unified FastAPI Backend
  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: scholarai-backend
    env_file:
      - .env.docker
    environment:
      - NEO4J_DISABLED=true
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - backend_models:/app/models
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  # Celery Worker for background PDF processing
  celery_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: scholarai-celery-worker
    command: celery -A app.core.celery_config worker --loglevel=info --concurrency=8 -Q celery,import.process,import.finalize
    env_file:
      - .env.docker
    environment:
      - NEO4J_DISABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_config", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
  backend_models:
  etcd_data:
  minio_data:
  milvus_data: