[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs =
    tests/deprecated
addopts = -v --tb=short
# Coverage plugin not installed - coverage arguments commented out
# To enable coverage: pip install pytest-cov
# addopts = -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=80
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: tests requiring external services
    requires_milvus: tests requiring live Milvus
