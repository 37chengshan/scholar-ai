version: '3.8'

services:
  # PostgreSQL 数据库 (带PGVector扩展)
  postgres:
    image: pgvector/pgvector:pg15
    container_name: scholarai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scholarai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scholarai123}
      POSTGRES_DB: ${POSTGRES_DB:-scholarai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scholarai} -d ${POSTGRES_DB:-scholarai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: scholarai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Neo4j 图数据库
  neo4j:
    image: neo4j:5-community
    container_name: scholarai-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/scholarai123}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # etcd - Milvus metadata store
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: scholarai-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # MinIO - Milvus object storage
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: scholarai-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # Milvus - Vector database for multimodal search
  milvus-standalone:
    image: milvusdb/milvus:v2.3.3
    container_name: scholarai-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"  # gRPC
      - "9091:9091"    # Metrics/health
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'

  # Unified FastAPI Backend (replaces Node.js + Python split)
  # Phase 27: Single Python backend on port 8000
  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: scholarai-backend
    environment:
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER:-scholarai}:${POSTGRES_PASSWORD:-scholarai123}@postgres:5432/${POSTGRES_DB:-scholarai}
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-scholarai123}
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530

      # LLM APIs
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}

      # Auth
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:-}

      # Storage
      - USE_LOCAL_STORAGE=${USE_LOCAL_STORAGE:-true}
      - LOCAL_STORAGE_PATH=/app/uploads
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}

      # Other
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - backend_models:/app/models
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
      milvus-standalone:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  # Celery Worker for background PDF processing
  celery_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: scholarai-celery-worker
    command: celery -A app.core.celery_config worker --loglevel=info --concurrency=8 -Q celery,import.process,import.finalize
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-scholarai}:${POSTGRES_PASSWORD:-scholarai123}@postgres:5432/${POSTGRES_DB:-scholarai}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - PYTHONUNBUFFERED=1
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_config", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy (optional - for production)
  nginx:
    image: nginx:alpine
    container_name: scholarai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  backend_models:
  etcd_data:
  minio_data:
  milvus_data:
