name: E2E Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  e2e-gate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: scholar_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: apps/api
        run: |
          pip install -r requirements.txt --quiet

      - name: Install browsers
        working-directory: apps/web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Wait for services
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U test_user && break
            sleep 1
          done

      - name: Create test environment
        working-directory: apps/api
        run: |
          cat > .env.test << 'ENVEOF'
          ENVIRONMENT=test
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/scholar_ai_test
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET=test-secret-key-for-ci
          NEO4J_URI=bolt://localhost:7687
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=scholarai123
          ZHIPU_API_KEY=test-zhipu-api-key
          OPENAI_API_KEY=test-openai-api-key
          ANTHROPIC_API_KEY=test-anthropic-api-key
          USE_LOCAL_STORAGE=true
          LOCAL_STORAGE_PATH=/tmp/uploads
          ENVEOF

      - name: Run database migrations
        working-directory: apps/api
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/scholar_ai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: scholarai123
        run: |
          set -euo pipefail
          alembic upgrade heads

      - name: Start backend
        working-directory: apps/api
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/scholar_ai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: scholarai123
          ZHIPU_API_KEY: test-zhipu-api-key
          OPENAI_API_KEY: test-openai-api-key
          ANTHROPIC_API_KEY: test-anthropic-api-key
        run: |
          set -euo pipefail

          uvicorn app.main:app --host 0.0.0.0 --port 8000 >/tmp/uvicorn-e2e.log 2>&1 &
          BACKEND_PID=$!

          echo "[e2e-gate] backend pid: ${BACKEND_PID}"

          for i in {1..60}; do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "[e2e-gate] backend health check passed"
              break
            fi

            if ! kill -0 "${BACKEND_PID}" 2>/dev/null; then
              echo "[e2e-gate] backend process exited before health check"
              cat /tmp/uvicorn-e2e.log || true
              exit 1
            fi

            sleep 1
          done

          if ! curl -sf http://localhost:8000/health >/dev/null; then
            echo "[e2e-gate] backend did not become healthy within timeout"
            cat /tmp/uvicorn-e2e.log || true
            exit 1
          fi

      - name: Run E2E gate
        run: |
          set -euo pipefail
          chmod +x scripts/check-e2e-gate.sh
          bash scripts/check-e2e-gate.sh --mode run
