name: CI Lite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-lite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run runtime hygiene check
        run: bash scripts/check-runtime-hygiene.sh tracked

      - name: Run doc governance check
        run: bash scripts/check-doc-governance.sh

      - name: Run structure boundary check
        run: bash scripts/check-structure-boundaries.sh

      - name: Run code boundary check
        run: bash scripts/check-code-boundaries.sh

      - name: Run phase tracking check
        run: bash scripts/check-phase-tracking.sh

      - name: Run branch lifecycle check
        run: bash scripts/check-branch-lifecycle.sh

      - name: Run contract gate check
        run: bash scripts/check-contract-gate.sh

      - name: Run fallback expiry check
        run: bash scripts/check-fallback-expiry.sh

      - name: Run E2E gate manifest check
        run: bash scripts/check-e2e-gate.sh --mode manifest

  web:
    name: Web Typecheck and Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:run
