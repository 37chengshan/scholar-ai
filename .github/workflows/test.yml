# GitHub Actions workflow for ScholarAI unified backend
# Phase 27: pytest test suite with 80%+ coverage

name: Test Unified Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend-python/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend-python/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: scholar_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend-python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Wait for database and cache services
        run: |
          set -euo pipefail
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U test_user && break
            sleep 2
          done
          for i in {1..30}; do
            redis-cli -h localhost -p 6379 ping | grep -q PONG && break
            sleep 2
          done

      - name: Prepare database schema
        working-directory: backend-python
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/scholar_ai_test
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: test_user
          TEST_DB_PASSWORD: test_password
          TEST_DB_NAME: scholar_ai_test
          OPENAI_API_KEY: sk-test
          ANTHROPIC_API_KEY: sk-ant-test
          ZHIPU_API_KEY: sk-zhipu-test
        run: |
          set -euo pipefail
          PGPASSWORD=test_password psql -h localhost -U test_user -d scholar_ai_test -c "SELECT 1;"
          PGPASSWORD=test_password psql -h localhost -U test_user -d scholar_ai_test <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'root') THEN
              CREATE ROLE root LOGIN PASSWORD 'test_password';
            END IF;
          END
          $$;
          SQL
          if ! alembic upgrade heads; then
            echo "Alembic bootstrap failed on clean CI DB; falling back to SQLAlchemy metadata bootstrap"
            python -c "import asyncio, app.models; from app.database import init_db; asyncio.run(init_db())"
          fi

      - name: Create test environment file
        working-directory: backend-python
        run: |
          cat > .env.test << EOF
          ENVIRONMENT=test
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/scholar_ai_test
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET=test-secret-key-for-ci
          JWT_PUBLIC_KEY=test-public-key
          JWT_PRIVATE_KEY=test-private-key
          OPENAI_API_KEY=sk-test
          ANTHROPIC_API_KEY=sk-ant-test
          NEO4J_URI=bolt://localhost:7687
          MILVUS_HOST=localhost
          MILVUS_PORT=19530
          USE_LOCAL_STORAGE=true
          LOCAL_STORAGE_PATH=/tmp/uploads
          EOF

      - name: Run unit tests
        working-directory: backend-python
        run: |
          pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/scholar_ai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci
          OPENAI_API_KEY: sk-test
          ANTHROPIC_API_KEY: sk-ant-test
          ZHIPU_API_KEY: sk-zhipu-test
          NEO4J_URI: bolt://localhost:7687
          MILVUS_HOST: localhost
          MILVUS_PORT: 19530
          USE_LOCAL_STORAGE: true
          LOCAL_STORAGE_PATH: /tmp/uploads
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: test_user
          TEST_DB_PASSWORD: test_password
          TEST_DB_NAME: scholar_ai_test

      - name: Run integration tests
        working-directory: backend-python
        run: |
          pytest tests/integration/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/scholar_ai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci
          OPENAI_API_KEY: sk-test
          ANTHROPIC_API_KEY: sk-ant-test
          ZHIPU_API_KEY: sk-zhipu-test
          NEO4J_URI: bolt://localhost:7687
          MILVUS_HOST: localhost
          MILVUS_PORT: 19530
          USE_LOCAL_STORAGE: true
          LOCAL_STORAGE_PATH: /tmp/uploads
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: test_user
          TEST_DB_PASSWORD: test_password
          TEST_DB_NAME: scholar_ai_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend-python/coverage.xml
          flags: unittests
          name: backend-python-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          pip install ruff black isort

      - name: Run Ruff
        continue-on-error: true
        working-directory: backend-python
        run: |
          ruff check app/ --output-format=github

      - name: Check formatting
        continue-on-error: true
        working-directory: backend-python
        run: |
          black --check app/

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: backend-python
        run: |
          docker build -t scholarai-backend:test .

      - name: Test Docker image
        run: |
          docker run --rm scholarai-backend:test python -c "from app.main import app; print('Build successful')"