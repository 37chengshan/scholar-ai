# GitHub Actions workflow for ScholarAI unified backend
# Phase 27: pytest test suite with 80%+ coverage

name: Test Unified Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend-python/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend-python/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: scholar_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend-python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Create test environment file
        working-directory: backend-python
        run: |
          cat > .env.test << EOF
          ENVIRONMENT=test
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/scholar_ai_test
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET=test-secret-key-for-ci
          JWT_PUBLIC_KEY=test-public-key
          JWT_PRIVATE_KEY=test-private-key
          OPENAI_API_KEY=sk-test
          ANTHROPIC_API_KEY=sk-ant-test
          NEO4J_URI=bolt://localhost:7687
          MILVUS_HOST=localhost
          MILVUS_PORT=19530
          USE_LOCAL_STORAGE=true
          LOCAL_STORAGE_PATH=/tmp/uploads
          EOF

      - name: Run unit tests
        working-directory: backend-python
        run: |
          pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/scholar_ai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci

      - name: Run integration tests
        working-directory: backend-python
        run: |
          pytest tests/integration/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80 || true
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/scholar_ai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend-python/coverage.xml
          flags: unittests
          name: backend-python-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          pip install ruff black isort

      - name: Run Ruff
        working-directory: backend-python
        run: |
          ruff check app/ --output-format=github || true

      - name: Check formatting
        working-directory: backend-python
        run: |
          black --check app/ || true

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: backend-python
        run: |
          docker build -t scholarai-backend:test .

      - name: Test Docker image
        run: |
          docker run --rm scholarai-backend:test python -c "from app.main import app; print('Build successful')"