name: Governance Baseline

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, edited, ready_for_review]
  push:
    branches: [main, develop]

jobs:
  governance-docs-and-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PR template body check
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: bash scripts/check-pr-template-body.sh

      - name: Verify governance scripts
        run: |
          set -euo pipefail
          chmod +x scripts/check-governance.sh scripts/check-doc-governance.sh scripts/check-structure-boundaries.sh scripts/check-code-boundaries.sh scripts/check-runtime-hygiene.sh scripts/check-phase-tracking.sh scripts/check-branch-lifecycle.sh scripts/check-contract-gate.sh scripts/check-fallback-expiry.sh scripts/check-e2e-gate.sh scripts/check-pr-template-body.sh
          bash scripts/check-runtime-hygiene.sh tracked
          bash scripts/check-governance.sh

  frontend-type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Conditional frontend validation
        run: |
          set -euo pipefail
          if [[ -d apps/web ]]; then
            if [[ ! -f apps/web/package.json ]]; then
              echo "apps/web/package.json missing while apps/web directory exists" >&2
              exit 1
            fi
            cd apps/web
            npm ci
            npm run type-check
            npx tsc -p ../../packages/types/tsconfig.json
            npx tsc -p ../../packages/sdk/tsconfig.json
          else
            echo "skip frontend type-check (apps/web directory not found)"
          fi

  backend-pytest-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Conditional backend smoke tests
        run: |
          set -euo pipefail
          if [[ -d apps/api ]]; then
            if [[ ! -f apps/api/pytest.ini ]]; then
              echo "apps/api/pytest.ini missing while apps/api directory exists" >&2
              exit 1
            fi
            cd apps/api
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pytest -q tests/unit/test_services.py --maxfail=1
          else
            echo "skip backend pytest smoke (apps/api directory not found)"
          fi
