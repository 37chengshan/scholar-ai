# Security Scanning Workflow for ScholarAI
# Integrates SAST, dependency scanning, and container security

name: Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, develop]
  schedule:
    # Run daily at 06:00 UTC to catch new vulnerabilities
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - sast-only
          - deps-only
          - container-only

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  SEMGREP_RULES: >-
    p/default
    p/security-audit
    p/secrets
    p/python
    p/typescript
    p/owasp-top-ten
    p/fastapi

jobs:
  # ─── Job 1: Semgrep SAST ──────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type != 'deps-only' && github.event.inputs.scan_type != 'container-only' }}

    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          semgrep ci \
            --config .semgrep.yml \
            --config "p/default" \
            --config "p/security-audit" \
            --config "p/secrets" \
            --config "p/python" \
            --config "p/typescript" \
            --config "p/owasp-top-ten" \
            --config "p/fastapi" \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            --verbose
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Generate Semgrep summary
        if: always()
        run: |
          echo "## Semgrep Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f semgrep-results.sarif ]; then
            # Count findings by severity
            ERROR_COUNT=$(grep -c '"level": "error"' semgrep-results.sarif || true)
            WARNING_COUNT=$(grep -c '"level": "warning"' semgrep-results.sarif || true)
            INFO_COUNT=$(grep -c '"level": "note"' semgrep-results.sarif || true)

            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Error | $ERROR_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| Warning | $WARNING_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| Info | $INFO_COUNT |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No results file generated" >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Job 2: CodeQL Analysis ──────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type != 'deps-only' && github.event.inputs.scan_type != 'container-only' }}

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ─── Job 3: Python Security (Bandit + Safety) ─────────────────────────
  python-security:
    name: Python Security
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type != 'deps-only' && github.event.inputs.scan_type != 'container-only' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          pip install bandit safety pip-audit

      - name: Run Bandit security linter
        working-directory: apps/api
        run: |
          bandit -r app/ \
            -ll \
            -ii \
            --format json \
            --output bandit-results.json \
            --skip B101,B311 \
            || true

          # Generate human-readable report
          bandit -r app/ \
            -ll \
            -ii \
            --skip B101,B311 \
            || true

      - name: Run pip-audit
        working-directory: apps/api
        run: |
          pip-audit -r requirements.txt \
            --format json \
            --output pip-audit-results.json \
            || true

          # Generate human-readable report
          pip-audit -r requirements.txt \
            || true

      - name: Run Safety check
        working-directory: apps/api
        continue-on-error: true
        run: |
          safety check \
            --json \
            --output safety-results.json \
            || true

      - name: Upload Python security results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-security-results
          path: |
            apps/api/bandit-results.json
            apps/api/pip-audit-results.json
            apps/api/safety-results.json
          retention-days: 30

      - name: Generate Python security summary
        if: always()
        run: |
          echo "## Python Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Bandit summary
          echo "### Bandit SAST" >> $GITHUB_STEP_SUMMARY
          if [ -f apps/api/bandit-results.json ]; then
            ISSUE_COUNT=$(jq '.results | length' apps/api/bandit-results.json 2>/dev/null || echo "0")
            echo "Found $ISSUE_COUNT issues" >> $GITHUB_STEP_SUMMARY
          fi

          # pip-audit summary
          echo "### Dependency Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          if [ -f apps/api/pip-audit-results.json ]; then
            VULN_COUNT=$(jq '.dependencies | map(select(.vulnerabilities | length > 0)) | length' apps/api/pip-audit-results.json 2>/dev/null || echo "0")
            echo "Found $VULN_COUNT vulnerable packages" >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Job 4: Node.js Security (npm audit + Snyk) ──────────────────────
  node-security:
    name: Node.js Security
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type != 'deps-only' && github.event.inputs.scan_type != 'container-only' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run npm audit (web)
        working-directory: apps/web
        run: |
          npm audit --json > npm-audit-web-results.json || true
          npm audit || true

      - name: Run npm audit (root)
        run: |
          npm audit --json > npm-audit-root-results.json || true
          npm audit || true

      - name: Install Snyk CLI
        run: |
          npm install -g snyk

      - name: Run Snyk test (web)
        working-directory: apps/web
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --json > snyk-web-results.json || true
          snyk test || true

      - name: Upload Node.js security results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-security-results
          path: |
            apps/web/npm-audit-web-results.json
            npm-audit-root-results.json
            apps/web/snyk-web-results.json
          retention-days: 30

      - name: Generate Node.js security summary
        if: always()
        working-directory: apps/web
        run: |
          echo "## Node.js Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # npm audit summary
          echo "### npm audit" >> $GITHUB_STEP_SUMMARY
          if [ -f npm-audit-web-results.json ]; then
            VULN_COUNT=$(jq '.metadata.vulnerabilities | to_entries | map(select(.value > 0)) | length' npm-audit-web-results.json 2>/dev/null || echo "0")
            echo "Found $VULN_COUNT vulnerability types" >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Job 5: Container Security (Trivy) ───────────────────────────────
  container-security:
    name: Container Security
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type != 'sast-only' && github.event.inputs.scan_type != 'deps-only' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t scholarai-backend:scan apps/api/
          docker build -t scholarai-frontend:scan apps/web/ || true

      - name: Run Trivy vulnerability scanner (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scholarai-backend:scan'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'

      - name: Run Trivy vulnerability scanner (frontend)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'scholarai-frontend:scan'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'

      - name: Generate container security summary
        if: always()
        run: |
          echo "## Container Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Clean up Docker images
        if: always()
        run: |
          docker rmi scholarai-backend:scan scholarai-frontend:scan || true

  # ─── Job 6: Secrets Detection (Gitleaks) ─────────────────────────────
  secrets-detection:
    name: Secrets Detection
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type != 'container-only' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose --redact

  # ─── Job 7: Security Summary ─────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [semgrep, codeql, python-security, node-security, container-security, secrets-detection]

    steps:
      - name: Generate security report
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep SAST | ${{ needs.semgrep.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Security | ${{ needs.python-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js Security | ${{ needs.node-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Security | ${{ needs.container-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Detection | ${{ needs.secrets-detection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if any critical job failed
          if [[ "${{ needs.semgrep.result }}" == "failure" || \
                "${{ needs.secrets-detection.result }}" == "failure" ]]; then
            echo "### ❌ Critical security issues detected" >> $GITHUB_STEP_SUMMARY
            echo "Please review the security scan results and fix any critical issues." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### ✅ Security scans passed" >> $GITHUB_STEP_SUMMARY
            echo "No critical security issues detected." >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Job 8: Notify on Security Issues ────────────────────────────────
  notify:
    name: Notify Security Team
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: [security-summary]

    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_SECURITY_WEBHOOK }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚨 Security scan failed on main branch. Please review: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            $SLACK_WEBHOOK_URL

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Security Scan Failed: ${new Date().toISOString().split('T')[0]}`;
            const body = `## Security Scan Failure

            **Branch:** ${context.ref}
            **Commit:** ${context.sha}
            **Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            The security scan workflow failed. Please review the scan results and address any critical findings.

            ### Next Steps
            1. Review the workflow run details
            2. Check each security scan job for specific findings
            3. Fix any critical or high severity issues
            4. Re-run the workflow to verify fixes
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'priority:high']
            });
